name: Legacy Redirects E2E Smoke Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  playwright-legacy-redirects:
    name: Playwright — legacy redirect & preview UI guard
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for Playwright runtime)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build app
        run: bun run build

      - name: Start preview server
        run: |
          bunx vite preview --port 4173 --host 127.0.0.1 &
          echo $! > .preview.pid
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:4173 > /dev/null && echo "ready" && exit 0
            sleep 1
          done
          echo "Preview server failed to start" && exit 1

      - name: Run Playwright legacy-redirect smoke test
        env:
          BASE_URL: http://127.0.0.1:4173
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
        run: bunx playwright test tests/legacy-redirects.spec.ts --reporter=list

      - name: Stop preview server
        if: always()
        run: |
          if [ -f .preview.pid ]; then
            kill "$(cat .preview.pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
